name: SignalMind Daily Price Updater
on:
  schedule:
    - cron: "0 16 * * *"  # Every day at 6PM Cairo (after markets close)
  workflow_dispatch:

jobs:
  update_prices:
    name: Update Signal Prices & Track Portfolio
    runs-on: ubuntu-latest
    env:
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Price Updater
        run: python src/price_updater.py
      - name: Run Trade Tracker
        run: python src/trade_tracker.py
      - name: Run Portfolio Brief
        run: python src/bot_notifier.py
