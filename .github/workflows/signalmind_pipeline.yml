name: SignalMind Cloud Pipeline

on:
  schedule:
    - cron: "0 4 * * 1-5"   # US: 6AM Cairo (Mon-Fri)
    - cron: "30 12 * * 0-4" # EGX: 2:30PM Cairo = 12:30 UTC (Sun-Thu)
  workflow_dispatch:

jobs:
  # Job 1: US Market Analysis (runs at 6AM Cairo using previous day's close)
  us_analysis:
    name: US Market Analysis
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || true
    env:
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      MARKET_TARGET: "US"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: Update Prices First
        run: python src/price_updater.py
      - name: Run US Analysis
        run: python src/main.py
      - name: Track Portfolio
        run: python src/trade_tracker.py
      - name: Send Brief
        run: python src/bot_notifier.py

  # Job 2: EGX Market Analysis (runs at 3PM Cairo after Egyptian market closes)
  egx_analysis:
    name: EGX Market Analysis
    runs-on: ubuntu-latest
    env:
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      MARKET_TARGET: "EGX"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: Update Prices First
        run: python src/price_updater.py
      - name: Run EGX Analysis
        run: python src/main.py
      - name: Track Portfolio
        run: python src/trade_tracker.py
      - name: Send Brief
        run: python src/bot_notifier.py
