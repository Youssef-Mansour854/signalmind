name: SignalMind Cloud Pipeline

on:
  schedule:
    - cron: "0 7 * * 0-5"  # كل يوم الساعة 9 القاهرة (7 UTC) عدا السبت
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  run_pipeline:
    name: Run SignalMind Analyzer & Briefer
    runs-on: ubuntu-latest

    env:
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip" # Caching pip dependencies for faster subsequent runs

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Signalmind Analysis (The Hunter)
        run: python src/main.py

      - name: Run Telegram Portfolio Brief (The Telegram Briefer)
        run: python src/bot_notifier.py
