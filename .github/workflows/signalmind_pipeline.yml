name: SignalMind Cloud Pipeline

on:
  schedule:
    - cron: "0 5 * * 1-5"  # Main pipeline: Mon-Fri at 7AM Cairo (US + EGX)
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  run_pipeline:
    name: Run SignalMind Analyzer & Briefer
    runs-on: ubuntu-latest

    env:
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Step 1 - Update Existing Signal Prices
        run: python src/price_updater.py

      - name: Step 2 - Run Main Stock Analysis
        run: python src/main.py

      - name: Step 3 - Track Portfolio Positions
        run: python src/trade_tracker.py

      - name: Step 4 - Send Portfolio Brief
        run: python src/bot_notifier.py
